<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flappy Tom</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #70c5ce;
            font-family: Arial, sans-serif;
            overflow: hidden;
        }
        #gameContainer {
            position: relative;
        }
        canvas {
            display: block;
            border: 2px solid #333;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        #startScreen, #gameOverScreen {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            color: white;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }
        #startScreen h1 {
            font-size: 48px;
            margin-bottom: 20px;
        }
        #startScreen p {
            font-size: 24px;
            animation: pulse 1.5s infinite;
        }
        #gameOverScreen {
            display: none;
        }
        #gameOverScreen h2 {
            font-size: 40px;
            margin-bottom: 15px;
        }
        #gameOverScreen p {
            font-size: 28px;
            margin-bottom: 20px;
        }
        #restartBtn {
            padding: 15px 30px;
            font-size: 20px;
            background: #e8a838;
            border: none;
            border-radius: 25px;
            color: white;
            cursor: pointer;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.3);
            transition: transform 0.1s;
        }
        #restartBtn:hover {
            transform: scale(1.05);
        }
        #score {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 40px;
            color: white;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            z-index: 10;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <canvas id="gameCanvas" width="320" height="480"></canvas>
        <div id="score">0</div>
        <div id="startScreen">
            <h1>Flappy Tom</h1>
            <p>点击或按空格开始</p>
        </div>
        <div id="gameOverScreen">
            <h2>游戏结束</h2>
            <p>得分: <span id="finalScore">0</span></p>
            <button id="restartBtn">再玩一次</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreDisplay = document.getElementById('score');
        const startScreen = document.getElementById('startScreen');
        const gameOverScreen = document.getElementById('gameOverScreen');
        const finalScoreDisplay = document.getElementById('finalScore');
        const restartBtn = document.getElementById('restartBtn');

        let gameRunning = false;
        let gameStarted = false;
        let score = 0;
        let frames = 0;

        const bird = {
            x: 50,
            y: 150,
            width: 30,
            height: 24,
            velocity: 0,
            gravity: 0.12,
            jumpStrength: -4.5,
            rotation: 0,
            draw: function() {
                ctx.save();
                ctx.translate(this.x + this.width/2, this.y + this.height/2);
                ctx.rotate(this.rotation);
                
                // 汤姆猫身体 - 灰色椭圆形
                ctx.fillStyle = '#808080';
                ctx.beginPath();
                ctx.ellipse(0, 0, this.width/2, this.height/2, 0, 0, Math.PI * 2);
                ctx.fill();
                
                // 汤姆猫脸部 - 白色
                ctx.fillStyle = '#f5f5f5';
                ctx.beginPath();
                ctx.ellipse(2, 2, 10, 9, 0, 0, Math.PI * 2);
                ctx.fill();
                
                // 眼睛 - 白色底
                ctx.fillStyle = '#fff';
                ctx.beginPath();
                ctx.arc(6, -2, 5, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.arc(14, -2, 5, 0, Math.PI * 2);
                ctx.fill();
                
                // 眼珠 - 绿色
                ctx.fillStyle = '#90EE90';
                ctx.beginPath();
                ctx.arc(7, -2, 3, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.arc(15, -2, 3, 0, Math.PI * 2);
                ctx.fill();
                
                // 瞳孔 - 黑色
                ctx.fillStyle = '#000';
                ctx.beginPath();
                ctx.arc(8, -2, 1.5, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.arc(16, -2, 1.5, 0, Math.PI * 2);
                ctx.fill();
                
                // 鼻子 - 粉色
                ctx.fillStyle = '#FFB6C1';
                ctx.beginPath();
                ctx.ellipse(11, 3, 2, 1.5, 0, 0, Math.PI * 2);
                ctx.fill();
                
                // 嘴巴
                ctx.strokeStyle = '#333';
                ctx.lineWidth = 1;
                ctx.beginPath();
                ctx.arc(11, 5, 3, 0, Math.PI);
                ctx.stroke();
                
                // 耳朵
                ctx.fillStyle = '#808080';
                ctx.beginPath();
                ctx.moveTo(-5, -8);
                ctx.lineTo(-10, -15);
                ctx.lineTo(0, -10);
                ctx.closePath();
                ctx.fill();
                ctx.beginPath();
                ctx.moveTo(15, -8);
                ctx.lineTo(20, -15);
                ctx.lineTo(10, -10);
                ctx.closePath();
                ctx.fill();
                
                // 耳朵内部 - 粉色
                ctx.fillStyle = '#FFB6C1';
                ctx.beginPath();
                ctx.moveTo(-4, -9);
                ctx.lineTo(-8, -14);
                ctx.lineTo(-1, -10);
                ctx.closePath();
                ctx.fill();
                ctx.beginPath();
                ctx.moveTo(14, -9);
                ctx.lineTo(18, -14);
                ctx.lineTo(11, -10);
                ctx.closePath();
                ctx.fill();
                
                // 胡子
                ctx.strokeStyle = '#333';
                ctx.lineWidth = 1;
                ctx.beginPath();
                ctx.moveTo(2, 4); ctx.lineTo(-5, 2);
                ctx.moveTo(2, 6); ctx.lineTo(-5, 6);
                ctx.moveTo(20, 4); ctx.lineTo(27, 2);
                ctx.moveTo(20, 6); ctx.lineTo(27, 6);
                ctx.stroke();
                
                ctx.restore();
            },
            update: function() {
                this.velocity += this.gravity;
                this.y += this.velocity;
                
                if (this.velocity < 0) {
                    this.rotation = -0.4;
                } else if (this.velocity > 0) {
                    this.rotation += 0.05;
                    if (this.rotation > 0.6) this.rotation = 0.6;
                }
                
                if (this.y + this.height > canvas.height - 20) {
                    this.y = canvas.height - 20 - this.height;
                    gameOver();
                }
                if (this.y < 0) {
                    this.y = 0;
                    this.velocity = 0;
                }
            },
            flap: function() {
                this.velocity = this.jumpStrength;
            },
            reset: function() {
                this.y = 150;
                this.velocity = 0;
                this.rotation = 0;
            }
        };

        const pipes = {
            items: [],
            width: 50,
            gap: 110,
            dx: 2.5,
            draw: function() {
                for (let i = 0; i < this.items.length; i++) {
                    const p = this.items[i];
                    
                    ctx.fillStyle = '#73bf2e';
                    ctx.fillRect(p.x, 0, this.width, p.top);
                    ctx.fillStyle = '#558c22';
                    ctx.fillRect(p.x + 5, 0, this.width - 10, p.top);
                    
                    ctx.fillStyle = '#73bf2e';
                    ctx.fillRect(p.x, canvas.height - p.bottom, this.width, p.bottom);
                    ctx.fillStyle = '#558c22';
                    ctx.fillRect(p.x + 5, canvas.height - p.bottom, this.width - 10, p.bottom);
                    
                    ctx.fillStyle = '#5a9c1b';
                    ctx.fillRect(p.x, p.top - 15, this.width, 15);
                    ctx.fillRect(p.x, canvas.height - p.bottom, this.width, 15);
                }
            },
            update: function() {
                if (frames % 100 === 0) {
                    const topHeight = Math.random() * (canvas.height - 200) + 50;
                    this.items.push({
                        x: canvas.width,
                        top: topHeight,
                        bottom: canvas.height - this.gap - topHeight
                    });
                }
                
                for (let i = 0; i < this.items.length; i++) {
                    this.items[i].x -= this.dx;
                    
                    if (this.items[i].x + this.width < 0) {
                        this.items.splice(i, 1);
                        i--;
                        continue;
                    }
                    
                    const p = this.items[i];
                    if (bird.x + bird.width > p.x && bird.x < p.x + this.width) {
                        if (bird.y < p.top || bird.y + bird.height > canvas.height - p.bottom) {
                            gameOver();
                        }
                    }
                    
                    if (p.x + this.width < bird.x && !p.passed) {
                        score++;
                        scoreDisplay.textContent = score;
                        p.passed = true;
                    }
                }
            },
            reset: function() {
                this.items = [];
            }
        };

        const background = {
            clouds: [
                {x: 50, y: 80, s: 1},
                {x: 200, y: 50, s: 0.8},
                {x: 350, y: 90, s: 1.2}
            ],
            drawClouds: function() {
                ctx.fillStyle = 'rgba(255, 255, 255, 0.8)';
                for (let c of this.clouds) {
                    ctx.beginPath();
                    ctx.arc(c.x, c.y, 20 * c.s, 0, Math.PI * 2);
                    ctx.arc(c.x + 25 * c.s, c.y - 10 * c.s, 25 * c.s, 0, Math.PI * 2);
                    ctx.arc(c.x + 50 * c.s, c.y, 20 * c.s, 0, Math.PI * 2);
                    ctx.fill();
                }
            },
            drawGround: function() {
                ctx.fillStyle = '#ded895';
                ctx.fillRect(0, canvas.height - 20, canvas.width, 20);
                
                ctx.fillStyle = '#cbb968';
                for (let i = 0; i < canvas.width; i += 20) {
                    ctx.fillRect(i - (frames * 2) % 20, canvas.height - 20, 10, 20);
                }
            },
            draw: function() {
                ctx.fillStyle = '#70c5ce';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                
                this.drawClouds();
                this.drawGround();
            }
        };

        function gameOver() {
            gameRunning = false;
            finalScoreDisplay.textContent = score;
            gameOverScreen.style.display = 'block';
        }

        function resetGame() {
            bird.reset();
            pipes.reset();
            score = 0;
            frames = 0;
            scoreDisplay.textContent = '0';
            gameOverScreen.style.display = 'none';
            startScreen.style.display = 'none';
            gameRunning = true;
            gameStarted = true;
            gameLoop();
        }

        function startGame() {
            if (!gameStarted) {
                resetGame();
            }
        }

        function gameLoop() {
            if (!gameRunning) return;
            
            frames++;
            
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            background.draw();
            pipes.update();
            pipes.draw();
            bird.update();
            bird.draw();
            
            requestAnimationFrame(gameLoop);
        }

        function handleInput(e) {
            if (e.type === 'keydown' && e.code !== 'Space') return;
            if (e.type === 'keydown') e.preventDefault();
            
            if (!gameStarted) {
                startGame();
            } else if (gameRunning) {
                bird.flap();
            }
        }

        document.addEventListener('keydown', handleInput);
        canvas.addEventListener('click', handleInput);
        restartBtn.addEventListener('click', resetGame);

        background.draw();
        bird.draw();
    </script>
</body>
</html>
